# Theme and integration
set -g default-terminal "tmux-256color"
# Advertise true-color, OSC 8 hyperlinks, styled underlines, and OSC 7 cwd to Ghostty
set -sa terminal-features ",xterm-ghostty:RGB:hyperlinks:usstyle:osc7"
set -g mouse on

# Extended keys (CSI u) so TUIs can distinguish Shift+Enter, Ctrl+/, Alt+hjkl, etc.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g extended-keys-format csi-u

# Undercurl + colored underlines (used by Neovim diagnostics, Claude Code)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Responsiveness for TUIs (Claude Code, vim, etc.)
set -sg escape-time 10
set -g focus-events on
# Required for image protocols and some TUI escape sequences; minor risk on shared hosts
set -g allow-passthrough on
set -g aggressive-resize on

# Clipboard via OSC 52 (tmux copy-mode + inner apps -> Ghostty system clipboard)
set -g set-clipboard on

# Misc
set -g history-limit 50000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g status-interval 5
